name: Deploy

# Deploys the server to the Raspberry Pi via the existing Cloudflare Tunnel SSH
# route (same mechanism as the honbabnono project — no Tailscale needed).
# Triggers ONLY on push to main and manual dispatch — never on PRs, so fork/PR
# code can never run with the deploy secrets.
#
# Required repo secrets:
#   SSH_HOST     - Cloudflare SSH hostname for the Pi (e.g. deploy.eattable.kr)
#   SSH_USER     - deploy user (gyoungyoon)
#   SSH_PASSWORD - that user's password (used via sshpass)
#
# The build runs ON the Pi but is launched DETACHED (setsid) and polled via short
# SSH calls, so a dropped tunnel during the multi-minute ARM build is harmless.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install cloudflared + sshpass + rsync
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
          sudo dpkg -i cloudflared.deb
          sudo apt-get update && sudo apt-get install -y sshpass rsync

      - name: Configure SSH over Cloudflare Tunnel
        run: |
          mkdir -p ~/.ssh
          cat >> ~/.ssh/config << SSHCONFIG
          Host ${{ secrets.SSH_HOST }}
            ProxyCommand cloudflared access ssh --hostname %h
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          SSHCONFIG

      - name: Sync source to Pi
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          for attempt in 1 2 3; do
            sshpass -e rsync -az --delete \
              --exclude '.git' \
              --exclude '.env.prod' \
              --exclude '.env' \
              --exclude '**/.env' \
              --exclude 'node_modules' \
              --exclude '**/node_modules' \
              --exclude 'packages/mobile' \
              --exclude '**/dist' \
              -e "ssh -o ConnectTimeout=25" \
              ./ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/badminton/" && break
            echo "rsync 재시도 $attempt..."; sleep 10
          done

      - name: Inject Google OAuth keys into .env.prod (Pi)
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
          G_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          G_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          if [ -z "$G_CLIENT_SECRET" ]; then echo "GOOGLE 시크릿 미설정 — 건너뜀"; exit 0; fi
          ssh_pi() { sshpass -e ssh -o ConnectTimeout=25 "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "$1"; }
          # .env.prod 는 서버에만 있고 rsync 에서 제외됨 — 여기서 GOOGLE_* 만 idempotent 하게 갱신.
          ssh_pi "cd /opt/badminton && touch .env.prod && sed -i '/^GOOGLE_CLIENT_ID=/d; /^GOOGLE_CLIENT_SECRET=/d' .env.prod && echo 'GOOGLE_CLIENT_ID=$G_CLIENT_ID' >> .env.prod && echo 'GOOGLE_CLIENT_SECRET=$G_CLIENT_SECRET' >> .env.prod && echo 'GOOGLE keys injected'" \
            || echo "주입 실패(무시) — 구글 로그인은 키 설정 전까지 비활성"

      - name: Inject OPENAI_API_KEY into .env.prod (Pi)
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
          OPENAI_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_KEY" ]; then echo "OPENAI 시크릿 미설정 — 건너뜀(운영판 AI 명령 비활성)"; exit 0; fi
          ssh_pi() { sshpass -e ssh -o ConnectTimeout=25 "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "$1"; }
          # .env.prod 에 OPENAI_API_KEY 만 idempotent 하게 갱신 (운영판 자유문장 명령 AI 파싱용).
          ssh_pi "cd /opt/badminton && touch .env.prod && sed -i '/^OPENAI_API_KEY=/d' .env.prod && echo 'OPENAI_API_KEY=$OPENAI_KEY' >> .env.prod && echo 'OPENAI key injected'" \
            || echo "주입 실패(무시) — AI 명령은 키 설정 전까지 비활성"

      - name: Inject SLACK_WEBHOOK_URL into .env.prod (Pi)
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
          SLACK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_URL" ]; then echo "SLACK 시크릿 미설정 — 건너뜀(가입 신청 알림 비활성)"; exit 0; fi
          ssh_pi() { sshpass -e ssh -o ConnectTimeout=25 "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "$1"; }
          # .env.prod 에 SLACK_WEBHOOK_URL 만 idempotent 하게 갱신 (운영자 가입 신청 알림용).
          ssh_pi "cd /opt/badminton && touch .env.prod && sed -i '/^SLACK_WEBHOOK_URL=/d' .env.prod && echo 'SLACK_WEBHOOK_URL=$SLACK_URL' >> .env.prod && echo 'SLACK webhook injected'" \
            || echo "주입 실패(무시) — 가입 신청 알림은 웹훅 설정 전까지 비활성"

      - name: Build & deploy on Pi (detached) + poll
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          ssh_pi() { sshpass -e ssh -o ConnectTimeout=25 "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "$1"; }

          # Build on the Pi takes several minutes and the tunnel can drop, so run
          # it detached and write OK/FAIL to a status file we poll for.
          for attempt in 1 2 3; do
            if ssh_pi 'rm -f /opt/badminton/deploy.status /opt/badminton/deploy.log; setsid bash -c "
              cd /opt/badminton
              if bash scripts/deploy-remote.sh >> deploy.log 2>&1; then echo OK > deploy.status; else echo FAIL > deploy.status; fi
            " < /dev/null > /dev/null 2>&1 &'; then
              echo "배포 시작(detached)."; break
            fi
            echo "시작 SSH 재시도 $attempt..."; sleep 15
          done

          echo "=== 배포 완료 폴링 (최대 ~20분) ==="
          STATUS=""
          for i in $(seq 1 40); do
            sleep 30
            STATUS=$(ssh_pi "cat /opt/badminton/deploy.status 2>/dev/null" 2>/dev/null || echo "")
            echo "[$i/40] 상태: ${STATUS:-진행중}"
            [ -n "$STATUS" ] && break
          done

          echo "=== 배포 로그(마지막 30줄) ==="
          ssh_pi "tail -30 /opt/badminton/deploy.log 2>/dev/null" || true

          if [ "$STATUS" != "OK" ]; then
            echo "::error::배포 실패 (status=${STATUS:-timeout}). 기존 컨테이너는 유지됨."
            exit 1
          fi

          echo "=== 헬스체크 ==="
          for i in $(seq 1 12); do
            sleep 5
            code=$(ssh_pi "curl -s -o /dev/null -w '%{http_code}' http://localhost:3131/api/v1/health" 2>/dev/null || echo "000")
            echo "[$i/12] API health: $code"
            [ "$code" = "200" ] && { echo "Deploy SUCCESS"; exit 0; }
          done
          echo "헬스체크 실패"; ssh_pi "docker logs badminton-prod-server --tail 30" || true
          exit 1
