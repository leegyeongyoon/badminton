name: Deploy Web

# Builds the Expo web export and deploys it to Cloudflare Pages (project
# "badminton-web"), which serves the root domain badmintoncourt.store. The web
# app talks to the API at https://api.badmintoncourt.store. This is separate
# from the server "Deploy" workflow (the Pi) — web is fully static on Cloudflare.
#
# Required repo secrets:
#   CLOUDFLARE_API_TOKEN  - token with Account > Cloudflare Pages > Edit
#   CLOUDFLARE_ACCOUNT_ID - your Cloudflare account id
on:
  push:
    branches: [main]
    paths:
      - 'packages/mobile/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: packages/mobile/package-lock.json

      - name: Install deps
        working-directory: packages/mobile
        run: npm ci

      - name: Export web (static bundle)
        working-directory: packages/mobile
        env:
          # Baked into the web bundle so the site calls the live API.
          EXPO_PUBLIC_API_URL: https://api.badmintoncourt.store
          # Kakao REST key = public OAuth client_id (safe to ship; only the
          # client_secret is private and stays server-side on the Pi).
          EXPO_PUBLIC_KAKAO_REST_KEY: 5a202bd90ab8dff01348f24cb1c37f3f
        run: |
          npx expo export --platform web
          # SPA fallback: client-routed paths (/join, /attend, refresh) -> index.html
          printf '/*    /index.html   200\n' > dist/_redirects

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/mobile
          command: pages deploy dist --project-name=badminton-web --branch=main
