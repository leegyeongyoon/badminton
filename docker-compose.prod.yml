# Production stack for the badminton server, deployed by .github/workflows/deploy.yml.
#
#   docker compose -f docker-compose.prod.yml ...
#
# Reads runtime secrets from a `.env.prod` file that lives ON THE SERVER ONLY
# (NOT committed; see .env.prod.example). The `server` service builds the slim
# runtime image (Dockerfile target `runner`); the one-shot `migrate` service
# builds the `migrator` target which keeps the Prisma CLI for migrations/seed.
name: badminton-prod

services:
  postgres:
    image: postgres:16-alpine
    container_name: badminton-prod-db
    environment:
      POSTGRES_USER: badminton
      POSTGRES_PASSWORD: badminton
      POSTGRES_DB: badminton
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U badminton -d badminton']
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  # One-shot: `docker compose run --rm migrate` (prisma migrate deploy).
  # Not started by `up`; invoked explicitly from scripts/deploy-remote.sh.
  migrate:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
      target: migrator
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
      target: runner
    container_name: badminton-prod-server
    env_file: .env.prod
    # 로그를 영속 볼륨(serverlogs)에 저장 → 배포로 컨테이너가 재생성돼도 winston 파일
    # 로그(error.log/combined.log)가 남는다. (예전엔 컨테이너 내부에만 써서 배포 때마다
    # 유실 → 장애 사후 진단 불가였음.) LOG_DIR 로 winston 출력 경로를 이 볼륨으로 고정.
    environment:
      - LOG_DIR=/app/logs
    volumes:
      - serverlogs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    # host 3131 -> container 3000 (app PORT). 3000을 비워두기 위해 호스트 포트만 변경.
    # Cloudflare 터널 public hostname 도 localhost:3131 로 연결.
    ports:
      - '3131:3000'
    # Liveness probe against the in-container app port (3000). Lets compose /
    # orchestrators detect a wedged process even while `restart: unless-stopped`
    # keeps a crashed one coming back.
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3000/api/v1/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  pgdata:
  serverlogs:
